<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOYFULHOUSE 재고관리</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #38bdf8; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        #search { width: 100%; padding: 12px; border-radius: 8px; background: var(--card); border: 1px solid #334155; color: white; margin-bottom: 16px; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #334155; }
        .info { display: flex; justify-content: space-between; align-items: center; }
        .name { font-size: 16px; font-weight: 600; }
        .stock-val { font-size: 18px; font-weight: 800; color: var(--primary); }
        .btns { display: flex; gap: 8px; margin-top: 12px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-minus { background: #ef4444; color: white; }
        .btn-plus { background: #22c55e; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🏠 JOYFULHOUSE</h1></div>
        <input type="text" id="search" placeholder="상품명 또는 바코드 검색..." onkeyup="filterItems()">
        <div id="list">데이터를 불러오는 중...</div>
    </div>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxVfCAgtN3335bMwO8sbsguK19iP-K1xnQFJi2lyi44FEWQZkVNgBAcwtnHLRGM_fBy/exec';
        let inventory = [];

        async function load() {
            try {
                const res = await fetch(API_URL);
                inventory = await res.json();
                render(inventory);
            } catch (e) { document.getElementById('list').innerText = "데이터 로딩 실패"; }
        }

        function render(items) {
            document.getElementById('list').innerHTML = items.map(item => `
                <div class="card">
                    <div class="info">
                        <div>
                            <div style="font-size:12px;color:#94a3b8">${item['바코드']}</div>
                            <div class="name">${item['제품명']}</div>
                        </div>
                        <div class="stock-val" id="stock-${item['바코드']}">${item['재고수량'] || item['현재재고'] || 0}</div>
                    </div>
                    <div class="btns">
                        <button class="btn-minus" onclick="update('${item['바코드']}', -1)">출고 -1</button>
                        <button class="btn-plus" onclick="update('${item['바코드']}', 1)">입고 +1</button>
                    </div>
                </div>
            `).join('');
        }

        async function update(id, amount) {
            const badge = document.getElementById(`stock-${id}`);
            badge.innerText = "⏳";
            await fetch(`${API_URL}?id=${id}&amount=${amount}`, { method: 'POST' });
            load();
        }

        function filterItems() {
            const q = document.getElementById('search').value.toLowerCase();
            render(inventory.filter(i => i['제품명'].toLowerCase().includes(q) || String(i['바코드']).toLowerCase().includes(q)));
        }
        load();
    </script>
</body>
</html>
