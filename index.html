<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOYFULHOUSE 재고관리</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.min.js"></script>
    <style>
        :root { --mint: #2dd4bf; --deep-mint: #0d9488; --mustard: #eab308; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: sans-serif; background: #f8fafc; color: var(--text); margin: 0; padding-bottom: 80px; }
        .sticky-top { position: sticky; top: 0; background: #fff; z-index: 100; border-bottom: 1px solid var(--border); }
        .header { padding: 15px 16px 5px; font-size: 24px; font-weight: 900; color: var(--mint); }
        .summary { display: flex; justify-content: space-around; padding: 12px; background: #fff; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .summary b { font-size: 22px; display: block; font-weight: 800; }
        .summary span { font-size: 11px; color: #64748b; font-weight: bold; }
        .nav-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 16px; background: #fff; scrollbar-width: none; }
        .tab-btn { flex-shrink: 0; background: var(--mustard); border: none; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; color: #fff; cursor: pointer; }
        .search-area { padding: 12px 16px; background: #fff; }
        input#search { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); box-sizing: border-box; background: #f1f5f9; outline: none; }
        .btn-group { display: flex; gap: 6px; padding: 0 16px 12px; background: #fff; }
        .btn-group button { flex: 1; padding: 12px; border: none; border-radius: 8px; color: #fff; font-weight: 800; cursor: pointer; }
        .item-row { background: #fff; padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
        .barcode-tag { font-family: monospace; font-size: 11px; color: #94a3b8; background: #f8fafc; border: 1px solid var(--border); padding: 2px 4px; border-radius: 4px; }
        .name { font-size: 14px; font-weight: 600; margin-left: 8px; }
        .stock-control { display: flex; align-items: center; gap: 10px; }
        .stock-val { font-size: 18px; font-weight: 800; min-width: 35px; text-align: center; }
        .stock-control button { width: 35px; height: 35px; border-radius: 6px; border: 1px solid var(--border); background: #fff; font-weight: bold; font-size: 18px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        #loader { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">데이터 불러오는 중...</div>

<div id="io-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="text-align:center;">재고 조정</h3>
        <input type="text" id="modal-id" placeholder="바코드 입력 또는 스캔">
        <input type="number" id="modal-amt" placeholder="수량 입력">
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal()" style="flex:1; padding:12px; border-radius:8px; border:none; background:#f1f5f9;">취소</button>
            <button id="modal-submit" style="flex:1; padding:12px; border-radius:8px; border:none; background:var(--mint); color:white; font-weight:bold;">확인</button>
        </div>
    </div>
</div>

<div id="file-modal" class="modal">
    <div class="modal-content">
        <h3 style="text-align:center;">주문서 업로드</h3>
        <p style="font-size:12px; color:#64748b; margin-bottom:15px; text-align:center;">엑셀의 첫 번째 열은 '바코드', 두 번째 열은 '수량'이어야 합니다.</p>
        <input type="file" id="excel-input" accept=".xlsx, .xls">
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal()" style="flex:1; padding:12px; border-radius:8px; border:none; background:#f1f5f9;">취on소</button>
            <button onclick="handleExcel()" style="flex:1; padding:12px; border-radius:8px; border:none; background:#6366f1; color:white; font-weight:bold;">파일 읽기</button>
        </div>
    </div>
</div>

<div class="sticky-top">
    <div class="header">🏠 JOYFULHOUSE</div>
    <div class="summary">
        <div><span>품목</span><b id="st-k">0</b></div>
        <div><span>총재고</span><b id="st-q">0</b></div>
        <div><span>위험</span><b id="st-d" style="color:red">0</b></div>
    </div>
    <div id="nav-tabs" class="nav-tabs"></div>
    <div class="search-area"><input type="text" id="search" placeholder="🔍 상품명 또는 바코드 검색" onkeyup="render()"></div>
    <div class="btn-group">
        <button style="background:#22c55e" onclick="openIOModal('입고')">입고</button>
        <button style="background:#f97316" onclick="openIOModal('출고')">출고</button>
        <button style="background:#6366f1" onclick="openFileModal()">주문서</button>
    </div>
</div>

<div id="list"></div>

<script>
    const URL = '사장님의_웹_앱_주소'; // 여기에 주소 꼭 다시 넣어주세요!

    let inventory = [];

    async function load() {
        try {
            const response = await fetch(URL);
            const rawData = await response.json();
            processData(rawData);
        } catch (err) {
            const script = document.createElement('script');
            script.src = URL + "?callback=processData&t=" + Date.now();
            document.body.appendChild(script);
        }
    }

    function processData(rows) {
        inventory = [];
        let currentCat = "기타";
        rows.forEach((row, i) => {
            if(i === 0) return;
            const val = String(row[0] || '').trim();
            if (val.startsWith('[') && val.endsWith(']')) {
                currentCat = val.replace(/[\[\]]/g, '');
            } else if (row[0] && row[1] && row[0] !== "바코드") {
                inventory.push({ "바코드": String(row[0]), "제품명": String(row[1]), "재고수량": parseInt(row[2]) || 0, "__cat": currentCat });
            }
        });
        renderTabs(); render(); updateStats();
        document.getElementById('loader').style.display = 'none';
    }

    function renderTabs() {
        const cats = [...new Set(inventory.map(i => i['__cat']))];
        document.getElementById('nav-tabs').innerHTML = cats.map(c => `<button class="tab-btn" onclick="render('${c}')">${c}</button>`).join('');
    }

    function render(cat = null) {
        const q = document.getElementById('search').value.toLowerCase();
        let filtered = inventory;
        if(q) filtered = inventory.filter(i => i.제품명.toLowerCase().includes(q) || i.바코드.includes(q));
        else if(cat) filtered = inventory.filter(i => i.__cat === cat);
        
        document.getElementById('list').innerHTML = filtered.map(i => `
            <div class="item-row">
                <div><span class="barcode-tag">${i.바코드}</span><span class="name">${i.제품명}</span></div>
                <div class="stock-control">
                    <button onclick="update('${i.바코드}', -1)">-</button>
                    <span class="stock-val" style="color:${i.재고수량 < 5 ? 'red' : 'inherit'}">${i.재고수량}</span>
                    <button onclick="update('${i.바코드}', 1)" style="color:var(--deep-mint)">+</button>
                </div>
            </div>`).join('');
    }

    /* 엑셀 파일 처리 로직 */
    function openFileModal() { document.getElementById('file-modal').style.display = 'flex'; }
    
    function handleExcel() {
        const file = document.getElementById('excel-input').files[0];
        if (!file) return alert("파일을 선택해주세요.");

        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

            let updateList = [];
            json.forEach((row, i) => {
                if (i === 0) return; // 제목줄 제외
                const barcode = String(row[0]).trim();
                const count = parseInt(row[1]) || 0;
                if (barcode && count !== 0) {
                    // 출고로 가정하여 수량을 마이너스로 변환 (입고라면 양수로 조정)
                    updateList.push({ id: barcode, amount: -count });
                }
            });

            if (updateList.length > 0) {
                if (confirm(`${updateList.length}개의 품목 재고를 차감할까요?`)) {
                    sendBulkUpdate(updateList);
                }
            }
        };
        reader.readAsArrayBuffer(file);
    }

    async function sendBulkUpdate(list) {
        // 화면 재고 먼저 반영
        list.forEach(u => {
            const item = inventory.find(i => String(i.바코드).trim() === String(u.id));
            if (item) item.재고수량 += u.amount;
        });
        render(); updateStats(); closeModal();

        // 구글 시트 전송
        await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(list) });
        alert("재고 반영이 완료되었습니다.");
    }

    function openIOModal(type) {
        document.getElementById('modal-title').innerText = type;
        document.getElementById('modal-id').value = "";
        document.getElementById('modal-amt').value = "";
        document.getElementById('modal-submit').onclick = () => {
            const id = document.getElementById('modal-id').value;
            const amt = parseInt(document.getElementById('modal-amt').value) * (type === '출고' ? -1 : 1);
            if(id && amt) { update(id, amt); closeModal(); }
        };
        document.getElementById('io-modal').style.display = 'flex';
    }

    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    async function update(id, amt) {
        const item = inventory.find(i => String(i.바코드).trim() === String(id).trim());
        if(item) {
            item.재고수량 += amt;
            render(); updateStats();
            fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify([{id, amount: amt}]) });
        }
    }

    function updateStats() {
        document.getElementById('st-q').innerText = inventory.reduce((s, i) => s + i.재고수량, 0).toLocaleString();
        document.getElementById('st-k').innerText = inventory.length;
        document.getElementById('st-d').innerText = inventory.filter(i => i.재고수량 < 5).length;
    }

    window.onload = load;
</script>
</body>
</html>
