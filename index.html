<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOYFULHOUSE 재고관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #20243a;
    --accent: #6c63ff;
    --green: #00c896;
    --orange: #ff6b35;
    --red: #ff4757;
    --text: #e8eaf0;
    --muted: #7b7f99;
    --border: #2a2d3e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #20243a 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top:0; z-index:100;
  }
  .header-left { display:flex; align-items:center; gap:12px; }
  .logo-icon { width:44px; height:44px; background:linear-gradient(135deg,var(--accent),#ff6b9d); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; }
  .logo-text h1 { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:#fff; }
  .logo-text p { font-size:11px; color:var(--muted); }
  .date-badge { background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:8px 14px; text-align:center; }
  .date-badge .date { font-size:13px; font-weight:700; color:var(--text); }
  .date-badge .time { font-size:11px; color:var(--muted); }

  /* SUMMARY */
  .summary { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; padding:16px 16px 0; }
  .sum-card { background:var(--card); border-radius:14px; padding:16px; border:1px solid var(--border); }
  .sum-card .icon { font-size:24px; margin-bottom:8px; }
  .sum-card .num { font-size:28px; font-weight:900; line-height:1; }
  .sum-card .num.blue { color:var(--accent); }
  .sum-card .num.green { color:var(--green); }
  .sum-card .num.red { color:var(--red); }
  .sum-card .label { font-size:11px; color:var(--muted); margin-top:4px; }

  /* BUTTONS */
  .btn-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; padding:14px 16px; }
  .btn { border:none; border-radius:12px; padding:14px 8px; font-size:14px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; transition:all .2s; }
  .btn:active { transform:scale(.95); }
  .btn-in { background:var(--green); color:#fff; }
  .btn-out { background:var(--orange); color:#fff; }
  .btn-order { background:var(--accent); color:#fff; }

  /* SEARCH */
  .search-wrap { padding:0 16px 12px; }
  .search-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 16px; display:flex; align-items:center; gap:10px; }
  .search-box input { background:none; border:none; outline:none; color:var(--text); font-size:14px; font-family:'Noto Sans KR',sans-serif; width:100%; }
  .search-box input::placeholder { color:var(--muted); }

  /* CATEGORY TABS */
  .tabs { display:flex; gap:8px; padding:0 16px 14px; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { border:1px solid var(--border); background:var(--card); color:var(--muted); border-radius:20px; padding:7px 14px; font-size:12px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; white-space:nowrap; transition:all .2s; }
  .tab.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }

  /* TABLE */
  .table-wrap { padding:0 16px 100px; }
  .category-block { margin-bottom:16px; }
  .cat-header { background:var(--card2); border-radius:12px 12px 0 0; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border:1px solid var(--border); border-bottom:none; cursor:pointer; }
  .cat-header-left { display:flex; align-items:center; gap:10px; }
  .cat-name { font-weight:700; font-size:15px; }
  .cat-count { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:2px 10px; font-size:12px; color:var(--muted); }
  .cat-danger { background:var(--red); color:#fff; border-radius:20px; padding:2px 10px; font-size:12px; font-weight:700; }
  .cat-arrow { color:var(--muted); font-size:12px; transition:transform .3s; }
  .cat-arrow.open { transform:rotate(180deg); }

  .table-container { border:1px solid var(--border); border-top:none; border-radius:0 0 12px 12px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  thead tr { background:var(--card2); }
  thead th { padding:10px 8px; font-size:11px; color:var(--muted); font-weight:500; text-align:center; border-bottom:1px solid var(--border); }
  tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:rgba(108,99,255,.05); }
  tbody td { padding:10px 8px; font-size:12px; text-align:center; }
  .td-barcode { color:var(--accent); font-weight:700; font-size:11px; }
  .td-name { text-align:left; color:var(--text); font-size:12px; line-height:1.4; }
  .td-qty { font-weight:900; font-size:15px; }
  .td-qty.ok { color:var(--green); }
  .td-qty.low { color:var(--red); }
  .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .status-dot.ok { background:var(--green); }
  .status-dot.low { background:var(--red); }

  /* +/- BUTTONS */
  .ctrl { display:flex; align-items:center; gap:4px; justify-content:center; }
  .ctrl-btn { width:26px; height:26px; border:none; border-radius:6px; font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
  .ctrl-btn:active { transform:scale(.9); }
  .ctrl-btn.plus { background:var(--green); color:#fff; }
  .ctrl-btn.minus { background:var(--red); color:#fff; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; display:none; align-items:flex-end; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--card); border-radius:20px 20px 0 0; padding:24px 20px 40px; width:100%; max-width:480px; border-top:1px solid var(--border); }
  .modal h2 { font-size:18px; font-weight:700; margin-bottom:20px; }
  .modal-search { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px 14px; width:100%; color:var(--text); font-size:14px; font-family:'Noto Sans KR',sans-serif; outline:none; margin-bottom:12px; }
  .modal-result { max-height:200px; overflow-y:auto; margin-bottom:16px; }
  .modal-item { padding:10px 12px; border-radius:8px; cursor:pointer; border:1px solid transparent; transition:all .15s; }
  .modal-item:hover, .modal-item.selected { background:var(--card2); border-color:var(--accent); }
  .modal-item .mi-name { font-size:13px; font-weight:700; }
  .modal-item .mi-bar { font-size:11px; color:var(--muted); }
  .modal-item .mi-qty { font-size:12px; color:var(--green); font-weight:700; }
  .qty-row { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .qty-row label { font-size:13px; color:var(--muted); white-space:nowrap; }
  .qty-input { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--text); font-size:16px; font-family:'Noto Sans KR',sans-serif; outline:none; flex:1; text-align:center; }
  .modal-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .modal-cancel { background:var(--card2); color:var(--muted); border:1px solid var(--border); border-radius:12px; padding:14px; font-size:15px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }
  .modal-confirm { border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; color:#fff; }
  .modal-confirm.in { background:var(--green); }
  .modal-confirm.out { background:var(--orange); }

  /* TOAST */
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:12px 24px; font-size:13px; font-weight:700; opacity:0; transition:all .3s; z-index:300; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* LOADING */
  .loading { text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .empty { text-align:center; padding:40px; color:var(--muted); font-size:13px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo-icon">🏠</div>
    <div class="logo-text">
      <h1>JOYFULHOUSE</h1>
      <p>재고 관리 시스템</p>
    </div>
  </div>
  <div class="date-badge">
    <div class="date" id="dateText"></div>
    <div class="time" id="timeText"></div>
  </div>
</div>

<!-- SUMMARY -->
<div class="summary">
  <div class="sum-card">
    <div class="icon">📦</div>
    <div class="num blue" id="totalItems">-</div>
    <div class="label">전체 품목</div>
  </div>
  <div class="sum-card">
    <div class="icon">📊</div>
    <div class="num green" id="totalQty">-</div>
    <div class="label">총 재고 수량</div>
  </div>
  <div class="sum-card">
    <div class="icon">🔴</div>
    <div class="num red" id="dangerItems">-</div>
    <div class="label">위험 품목</div>
  </div>
</div>

<!-- BUTTONS -->
<div class="btn-row">
  <button class="btn btn-in" onclick="openModal('in')">⬇️ 입고</button>
  <button class="btn btn-out" onclick="openModal('out')">⬆️ 출고</button>
  <button class="btn btn-order" onclick="alert('주문서 기능 준비중입니다.')">📋 주문서</button>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="바코드 또는 제품명 검색..." oninput="filterProducts()">
  </div>
</div>

<!-- TABS -->
<div class="tabs" id="tabsContainer"></div>

<!-- TABLE -->
<div class="table-wrap" id="tableWrap">
  <div class="loading"><div class="spinner"></div>데이터 불러오는 중...</div>
</div>

<!-- 입고/출고 MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">입고 처리</h2>
    <input class="modal-search" type="text" id="modalSearch" placeholder="바코드 또는 제품명 검색..." oninput="filterModalItems()">
    <div class="modal-result" id="modalResult"></div>
    <div class="qty-row">
      <label>수량</label>
      <input class="qty-input" type="number" id="qtyInput" value="1" min="1">
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">취소</button>
      <button class="modal-confirm in" id="modalConfirm" onclick="confirmInOut()">확인</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycby-R1Tr_HfE2q6O7-7YCpTapQRe63om8aP1oejCBGsvw6QusB1CUF9renUM2cicE1SX/exec';
const LOW_STOCK = 5;

let allData = [];
let currentCategory = '전체';
let currentMode = 'in';
let selectedBarcode = null;

// 날짜/시간
function updateClock() {
  const now = new Date();
  const d = now.toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'});
  const t = now.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
  document.getElementById('dateText').textContent = d;
  document.getElementById('timeText').textContent = t;
}
updateClock();
setInterval(updateClock, 1000);

// 데이터 로드
async function loadData() {
  try {
    const res = await fetch(`${API}?action=getAll`, {
      method: 'GET',
      mode: 'cors',
      redirect: 'follow'
    });
    const json = await res.json();
    if (json.status === 'ok') {
      allData = json.data.map(r => ({
        barcode: r.barcode,
        name: r.name,
        qty: r.qty,
        category: r.category || '기타'
      }));
      render();
    }
  } catch(e) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty">⚠️ 데이터 로드 실패<br>네트워크를 확인해주세요</div>';
  }
}

// 카테고리 추출
function getCategories() {
  const cats = ['전체'];
  const seen = new Set();
  allData.forEach(d => {
    if (!seen.has(d.category)) { seen.add(d.category); cats.push(d.category); }
  });
  return cats;
}

// 렌더링
function render() {
  updateSummary();
  renderTabs();
  renderTable();
}

function updateSummary() {
  const filtered = currentCategory === '전체' ? allData : allData.filter(d => d.category === currentCategory);
  document.getElementById('totalItems').textContent = filtered.length;
  document.getElementById('totalQty').textContent = filtered.reduce((s,d) => s+d.qty, 0);
  document.getElementById('dangerItems').textContent = filtered.filter(d => d.qty <= LOW_STOCK).length;
}

function renderTabs() {
  const cats = getCategories();
  const container = document.getElementById('tabsContainer');
  container.innerHTML = cats.map(c =>
    `<button class="tab ${c===currentCategory?'active':''}" onclick="setCategory('${c}')">${c==='전체'?'전체':c}</button>`
  ).join('');
}

function setCategory(cat) {
  currentCategory = cat;
  render();
}

function filterProducts() {
  renderTable();
}

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let data = currentCategory === '전체' ? allData : allData.filter(d => d.category === currentCategory);
  if (q) data = data.filter(d => d.barcode.toLowerCase().includes(q) || d.name.toLowerCase().includes(q));

  // 카테고리별 그룹
  const groups = {};
  data.forEach(d => {
    if (!groups[d.category]) groups[d.category] = [];
    groups[d.category].push(d);
  });

  if (data.length === 0) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty">🔍 검색 결과가 없습니다</div>';
    return;
  }

  let html = '';
  Object.entries(groups).forEach(([cat, items]) => {
    const dangerCount = items.filter(i => i.qty <= LOW_STOCK).length;
    html += `
    <div class="category-block">
      <div class="cat-header" onclick="toggleCat('cat_${cat}', this)">
        <div class="cat-header-left">
          <span class="cat-name">${cat}</span>
          <span class="cat-count">${items.length}종</span>
          ${dangerCount > 0 ? `<span class="cat-danger">🔴 ${dangerCount}</span>` : ''}
        </div>
        <span class="cat-arrow open">▲</span>
      </div>
      <div class="table-container" id="cat_${cat}">
        <table>
          <thead><tr>
            <th>상태</th><th>바코드</th><th>제품명</th><th>재고</th><th>조작</th>
          </tr></thead>
          <tbody>
            ${items.map(item => `
            <tr>
              <td><span class="status-dot ${item.qty > LOW_STOCK ? 'ok' : 'low'}"></span></td>
              <td class="td-barcode">${item.barcode}</td>
              <td class="td-name">${item.name}</td>
              <td class="td-qty ${item.qty > LOW_STOCK ? 'ok' : 'low'}">${item.qty}</td>
              <td>
                <div class="ctrl">
                  <button class="ctrl-btn plus" onclick="quickUpdate('${item.barcode}', 1)">+</button>
                  <button class="ctrl-btn minus" onclick="quickUpdate('${item.barcode}', -1)">-</button>
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  });
  document.getElementById('tableWrap').innerHTML = html;
}

function toggleCat(id, header) {
  const el = document.getElementById(id);
  const arrow = header.querySelector('.cat-arrow');
  if (el.style.display === 'none') {
    el.style.display = '';
    arrow.classList.add('open');
  } else {
    el.style.display = 'none';
    arrow.classList.remove('open');
  }
}

// 빠른 +/- 버튼
async function quickUpdate(barcode, change) {
  const item = allData.find(d => d.barcode === barcode);
  if (!item) return;
  const newQty = Math.max(0, item.qty + change);
  await updateServer(barcode, newQty);
  item.qty = newQty;
  render();
  showToast(`${item.name.substring(0,10)}... ${change > 0 ? '+' : ''}${change} 처리완료`);
}

// 서버 업데이트
async function updateServer(barcode, qty) {
  try {
    await fetch(`${API}?action=update&barcode=${encodeURIComponent(barcode)}&qty=${qty}`);
  } catch(e) { showToast('⚠️ 서버 연결 오류'); }
}

// 모달
function openModal(mode) {
  currentMode = mode;
  selectedBarcode = null;
  document.getElementById('modalTitle').textContent = mode === 'in' ? '⬇️ 입고 처리' : '⬆️ 출고 처리';
  document.getElementById('modalConfirm').className = `modal-confirm ${mode}`;
  document.getElementById('modalConfirm').textContent = mode === 'in' ? '입고 확인' : '출고 확인';
  document.getElementById('modalSearch').value = '';
  document.getElementById('qtyInput').value = 1;
  document.getElementById('modalResult').innerHTML = '';
  document.getElementById('modalOverlay').classList.add('show');
  filterModalItems();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function filterModalItems() {
  const q = document.getElementById('modalSearch').value.toLowerCase();
  const data = q ? allData.filter(d => d.barcode.toLowerCase().includes(q) || d.name.toLowerCase().includes(q)) : allData.slice(0, 20);
  document.getElementById('modalResult').innerHTML = data.map(d => `
    <div class="modal-item ${selectedBarcode===d.barcode?'selected':''}" onclick="selectItem('${d.barcode}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="mi-name">${d.name}</div>
          <div class="mi-bar">${d.barcode}</div>
        </div>
        <div class="mi-qty">재고 ${d.qty}</div>
      </div>
    </div>`).join('');
}

function selectItem(barcode) {
  selectedBarcode = barcode;
  filterModalItems();
}

async function confirmInOut() {
  if (!selectedBarcode) { showToast('제품을 선택해주세요'); return; }
  const qty = parseInt(document.getElementById('qtyInput').value) || 1;
  const change = currentMode === 'in' ? qty : -qty;
  const item = allData.find(d => d.barcode === selectedBarcode);
  if (!item) return;
  const newQty = Math.max(0, item.qty + change);
  await updateServer(selectedBarcode, newQty);
  item.qty = newQty;
  closeModal();
  render();
  showToast(`${currentMode === 'in' ? '입고' : '출고'} ${qty}개 처리완료 ✅`);
}

// 토스트
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 초기 로드
loadData();
// 30초마다 자동 갱신
setInterval(loadData, 30000);
</script>
</body>
</html>
