<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOYFULHOUSE 재고 관리</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #1e293b; --primary: #4f46e5; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        header { background: #fff; padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
        .container { max-width: 500px; margin: 0 auto; padding: 16px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 10px; text-align: center; }
        .stat-val { font-size: 20px; font-weight: 800; color: var(--primary); }
        .action-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .action-bar button { flex: 1; padding: 12px; border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; }
        #search { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; box-sizing: border-box; }
        .cat-section { background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .cat-header { padding: 12px 15px; background: #fdfdfd; border-bottom: 1px solid var(--border); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }
        .row-btns button { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); background: #fff; cursor: pointer; }
        #log-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--border); padding: 10px 15px; max-height: 80px; overflow-y: auto; font-size: 11px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 80%; max-width: 300px; }
        input[type="number"], input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: #4f46e5; font-size: 18px;">🏠 JOYFULHOUSE</div>
    <div id="current-date" style="font-size: 12px; color: #64748b;"></div>
</header>

<div class="container">
    <div class="stats-row">
        <div class="stat-card"><div id="stat-total-kind" class="stat-val">0</div><div style="font-size:10px">전체품목</div></div>
        <div class="stat-card"><div id="stat-total-qty" class="stat-val" style="color:#16a34a">0</div><div style="font-size:10px">총재고</div></div>
        <div class="stat-card"><div id="stat-danger-count" class="stat-val" style="color:#ef4444">0</div><div style="font-size:10px">위험품목</div></div>
    </div>

    <div class="action-bar">
        <button style="background:#22c55e" onclick="openModal('in')">입고</button>
        <button style="background:#f97316" onclick="openModal('out')">출고</button>
        <button style="background:#6366f1" onclick="document.getElementById('excelFile').click()">주문서</button>
        <input type="file" id="excelFile" style="display:none" onchange="handleExcelUpload(event)">
    </div>

    <input type="text" id="search" placeholder="상품명 또는 바코드 검색..." onkeyup="render()">
    <div id="inventory-list"></div>
</div>

<div id="log-panel"><strong>📋 로그:</strong> <span id="log-content"></span></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin:0">재고 조정</h3>
        <input type="text" id="modalBarcode" placeholder="바코드 입력">
        <input type="number" id="modalQty" value="1">
        <div style="display:flex; gap:10px">
            <button onclick="closeModal()" style="flex:1; padding:10px; border:none; border-radius:8px">취소</button>
            <button id="modalConfirmBtn" onclick="submitModalUpdate()" style="flex:1; padding:10px; border:none; border-radius:8px; color:#fff">확인</button>
        </div>
    </div>
</div>

<script>
    // ★사장님의 주소를 여기에 넣어주세요!
    const API_URL = 'https://script.google.com/macros/s/AKfycbxfNDa3brKAXAlc6HR86QGymPmLRNtb2TQts96TzXOPA_w3aeEWwWYJU0OtFmzqIQ/exec';
    
    let inventory = [];
    let activeMode = 'in';

    async function load() {
        try {
            const res = await fetch(API_URL);
            inventory = await res.json();
            updateStats();
            render();
            document.getElementById('current-date').innerText = new Date().toLocaleDateString();
        } catch (e) {
            document.getElementById('inventory-list').innerHTML = "연결 중...";
            setTimeout(load, 2000);
        }
    }

    function updateStats() {
        document.getElementById('stat-total-kind').innerText = inventory.length;
        document.getElementById('stat-total-qty').innerText = inventory.reduce((s, i) => s + (Number(Object.values(i)[2]) || 0), 0);
        document.getElementById('stat-danger-count').innerText = inventory.filter(i => (Number(Object.values(i)[2])||0) < 5).length;
    }

    function render() {
        const q = document.getElementById('search').value.toLowerCase();
        const groups = inventory.reduce((acc, i) => {
            const vals = Object.values(i);
            if (vals[1].toLowerCase().includes(q) || vals[0].toLowerCase().includes(q)) {
                const cat = i['품목'] || i['카테고리'] || '기타';
                if(!acc[cat]) acc[cat] = [];
                acc[cat].push(i);
            }
            return acc;
        }, {});

        let html = '';
        for(let cat in groups) {
            html += `<div class="cat-section"><div class="cat-header">${cat}</div><table>`;
            html += groups[cat].map(i => {
                const v = Object.values(i);
                return `<tr><td><small style="color:#94a3b8">${v[0]}</small><br><b>${v[1]}</b></td>
                    <td style="text-align:center; font-weight:bold">${v[2]}</td>
                    <td style="text-align:right" class="row-btns">
                        <button onclick="quickUpdate('${v[0]}', 1)">+</button>
                    </td></tr>`;
            }).join('');
            html += `</table></div>`;
        }
        document.getElementById('inventory-list').innerHTML = html;
    }

    async function quickUpdate(id, amount) {
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify([{id, amount}]) });
        document.getElementById('log-content').innerText = id + " 처리 완료";
        load();
    }

    function openModal(mode) { activeMode=mode; document.getElementById('modalTitle').innerText=mode==='in'?'입고':'출고'; document.getElementById('modalConfirmBtn').style.background=mode==='in'?'#22c55e':'#f97316'; document.getElementById('modal').style.display='flex'; }
    function closeModal() { document.getElementById('modal').style.display='none'; }
    async function submitModalUpdate() { 
        const id=document.getElementById('modalBarcode').value; 
        const qty=Number(document.getElementById('modalQty').value);
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify([{id, amount: activeMode==='in'?qty:-qty}]) });
        closeModal(); load();
    }

    load();
</script>
</body>
</html>
