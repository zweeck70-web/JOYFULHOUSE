<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOYFULHOUSE 재고관리</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --mint: #2dd4bf; --deep-mint: #0d9488; --mustard: #eab308; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: -apple-system, sans-serif; background: #f8fafc; color: var(--text); margin: 0; padding-bottom: 80px; }
        .sticky-top { position: sticky; top: 0; background: #fff; z-index: 100; border-bottom: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header { padding: 15px 16px 5px; font-size: 24px; font-weight: 900; color: var(--mint); }
        .summary { display: flex; justify-content: space-around; padding: 12px; background: #fff; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .summary b { font-size: 20px; display: block; font-weight: 800; }
        .summary span { font-size: 11px; color: #64748b; }
        .btn-group { display: flex; gap: 6px; padding: 12px 16px; background: #fff; }
        .btn-group button { flex: 1; padding: 12px; border: none; border-radius: 8px; color: #fff; font-weight: 800; cursor: pointer; }
        .item-row { background: #fff; padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
        .name { font-size: 14px; font-weight: 600; }
        .stock-val { font-size: 18px; font-weight: 800; min-width: 40px; text-align: center; }
        #loader { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; }
    </style>
</head>
<body>

<div id="loader">
    <div id="status">연결 수립 중...</div>
    <p id="sub-status" style="font-size:12px; color:gray; margin-top:10px;">455개 품목 데이터를 동기화하고 있습니다.</p>
    <button onclick="forceLoad()" style="margin-top:20px; padding:10px 20px; border-radius:8px; background:var(--mint); color:white; border:none; font-weight:bold;">데이터 강제 로드</button>
</div>

<div class="sticky-top">
    <div class="header">🏠 JOYFULHOUSE</div>
    <div class="summary">
        <div><span>품목</span><b id="st-k">0</b></div>
        <div><span>총재고</span><b id="st-q">0</b></div>
        <div><span>위험</span><b id="st-d" style="color:red">0</b></div>
    </div>
    <div class="btn-group">
        <button style="background:#22c55e" onclick="openIOModal('입고')">입고</button>
        <button style="background:#f97316" onclick="openIOModal('출고')">출고</button>
        <button style="background:#6366f1" onclick="openFileModal()">주문서</button>
    </div>
</div>

<div id="list"></div>

<script>
    // ★ 1. 사장님의 구글 웹 앱 URL을 여기에 넣어주세요!
    const URL = 'https://script.google.com/macros/s/AKfycbymwnG8rr2zY7JoSJkaKBejzoblKnfEzIpZ7fBN18lygrtfvK3w_GVsvJZ3-2cSl_7Dwg/exec'; 

    let inventory = [];

    // [강제 로딩 함수]
    function forceLoad() {
        const script = document.createElement('script');
        script.src = URL + "?callback=processData&t=" + Date.now();
        document.body.appendChild(script);
    }

    function processData(res) {
        const rows = res.rows;
        inventory = [];
        let currentCat = "기타";
        rows.forEach((row, i) => {
            if(i === 0) return;
            const val = String(row[0] || '').trim();
            if (val.startsWith('[') && val.endsWith(']')) {
                currentCat = val.replace(/[\[\]]/g, '');
            } else if (row[0] && row[1]) {
                inventory.push({ "바코드": String(row[0]), "제품명": String(row[1]), "재고수량": parseInt(row[2]) || 0, "__cat": currentCat });
            }
        });
        render(); updateStats();
        document.getElementById('loader').style.display = 'none';
    }

    function render() {
        document.getElementById('list').innerHTML = inventory.map(i => `
            <div class="item-row">
                <div><small style="color:#94a3b8">${i.바코드}</small><div class="name">${i.제품명}</div></div>
                <div class="stock-val">${i.재고수량}</div>
            </div>`).join('');
    }

    // 주문서 처리
    function openFileModal() { 
        // 엑셀 라이브러리가 잘 로드되었는지 확인
        if(typeof XLSX === 'undefined') {
            alert("라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.");
            return;
        }
        // ... (기존 주문서 팝업 로직)
        alert("주문서 파일을 선택해주세요.");
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.xlsx';
        input.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, {type:'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
                let updates = [];
                rows.forEach((r, idx) => { if(idx > 0 && r[0]) updates.push({id:String(r[0]), amount:-(parseInt(r[1])||0)}); });
                if(updates.length > 0) sendUpdate(updates);
            };
            reader.readAsArrayBuffer(file);
        };
        input.click();
    }

    async function sendUpdate(list) {
        list.forEach(u => {
            const item = inventory.find(i => String(i.바코드).trim() === u.id);
            if(item) item.재고수량 += u.amount;
        });
        render(); updateStats();
        fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(list) });
    }

    function updateStats() {
        document.getElementById('st-q').innerText = inventory.reduce((s, i) => s + i.재고수량, 0).toLocaleString();
        document.getElementById('st-k').innerText = inventory.length;
        document.getElementById('st-d').innerText = inventory.filter(i => i.재고수량 < 5).length;
    }

    window.onload = forceLoad;
</script>
</body>
</html>
