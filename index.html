    // 3. 재고 상태 색상 판별 (사장님 기준)
    function getStatusColor(item) {
        const s = item.stock;
        const t = item.type;
        
        let green, red;
        if (t.includes('벽시계')) { green = 10; red = 7; }
        else if (t.includes('주보')) { green = 15; red = 10; }
        else { green = 10; red = 5; } // 액자류 및 기타

        if (s >= green) return '#22c55e'; // 초록
        if (s < red) return '#ef4444';    // 빨강
        return '#eab308';                 // 노랑
    }

    // 4. 화면 그리기 함수
    function render(data) {
        const listDiv = document.getElementById('product-list');
        if (data.length === 0) {
            listDiv.innerHTML = '<div class="text-center py-10 text-gray-400 text-sm">검색 결과가 없습니다.</div>';
            return;
        }

        listDiv.innerHTML = data.map(item => {
            const dotColor = getStatusColor(item);
            return `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-100">
                    <div class="flex-1">
                        <div class="flex items-center">
                            <span class="status-dot" style="background-color: ${dotColor}"></span>
                            <span class="text-[10px] font-mono text-gray-400">${item.id}</span>
                        </div>
                        <span class="text-[15px] font-bold text-gray-700 block mt-1">${item.name}</span>
                    </div>
                    <div class="flex items-center gap-3 text-right">
                        <button class="w-8 h-8 rounded-lg bg-slate-50 border text-gray-400 font-bold">-</button>
                        <span class="text-xl font-black w-8 text-center" style="color: ${item.stock < 5 ? '#ef4444' : '#0d9488'}">${item.stock}</span>
                        <button class="w-8 h-8 rounded-lg bg-slate-50 border text-teal-500 font-bold">+</button>
                    </div>
                </div>
            `;
        }).join('');

        // 상단 통계 업데이트
        const total = data.reduce((acc, cur) => acc + cur.stock, 0);
        const risks = data.filter(item => {
            const s = item.stock;
            const t = item.type;
            if(t.includes('벽시계')) return s < 7;
            if(t.includes('주보')) return s < 10;
            return s < 5;
        }).length;

        document.getElementById('total-stock-display').innerText = total.toLocaleString();
        document.getElementById('risk-count-display').innerText = risks;
        document.getElementById('item-count').innerText = data.length;
    }

    // 5. 구글 시트에서 실시간 재고 가져오기
    async function fetchStock() {
        const statusEl = document.getElementById('sync-status');
        statusEl.innerText = "🔄 동기화 중...";
        
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            masterData.forEach(item => {
                const match = data.find(s => s.code === item.id);
                if(match) item.stock = match.stock;
            });

            statusEl.innerText = "✅ 연결됨";
            statusEl.style.color = "#22c55e";
            render(masterData);
        } catch (e) {
            statusEl.innerText = "❌ 연결 실패";
            statusEl.style.color = "#ef4444";
            render(masterData); // 실패해도 기본 데이터는 보여줌
        }
    }

    // 6. 필터 및 검색
    function filterCat(cat) {
        document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active', 'bg-yellow-400', 'text-white'));
        event.target.classList.add('active', 'bg-yellow-400', 'text-white');
        
        const filtered = (cat === '전체') ? masterData : masterData.filter(i => i.type.includes(cat));
        render(filtered);
    }

    function handleSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = masterData.filter(i => i.name.toLowerCase().includes(q) || i.id.toLowerCase().includes(q));
        render(filtered);
    }

    // 실행 시작
    window.onload = () => {
        if(API_URL.includes("여기에")) {
            alert("API 주소를 먼저 입력해주세요!");
            render(masterData);
        } else {
            fetchStock();
        }
    };

</script>
