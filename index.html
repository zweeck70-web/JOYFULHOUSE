<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOYFULHOUSE 재고관리</title>
    <style>
        :root { --mint: #2dd4bf; --deep-mint: #0d9488; --text: #1e293b; }
        body { font-family: sans-serif; background: #f8fafc; color: var(--text); margin: 0; padding-bottom: 80px; }
        .sticky-top { position: sticky; top: 0; background: #fff; z-index: 100; border-bottom: 1px solid #e2e8f0; }
        .header { padding: 15px 16px; font-size: 22px; font-weight: 900; color: var(--mint); }
        .summary { display: flex; justify-content: space-around; padding: 12px; background: #fff; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .summary b { font-size: 20px; display: block; }
        .summary span { font-size: 11px; color: #64748b; }
        .search-area { padding: 12px; background: #fff; }
        input#search { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; box-sizing: border-box; background: #f1f5f9; outline: none; }
        .btn-group { display: flex; gap: 8px; padding: 0 12px 12px; background: #fff; }
        .btn-group button { flex: 1; padding: 12px; border: none; border-radius: 8px; color: #fff; font-weight: bold; }
        .item-row { background: #fff; padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
        .barcode { font-size: 11px; color: #94a3b8; background: #f1f5f9; padding: 2px 5px; border-radius: 4px; }
        .name { font-size: 15px; font-weight: 600; display: block; margin-top: 4px; }
        .stock-control { display: flex; align-items: center; gap: 10px; }
        .stock-val { font-size: 18px; font-weight: 800; width: 40px; text-align: center; }
        .stock-control button { width: 35px; height: 35px; border-radius: 6px; border: 1px solid #e2e8f0; background: #fff; font-weight: bold; font-size: 18px; }
        #loader { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">데이터 연결 시도 중...</div>

<div class="sticky-top">
    <div class="header">🏠 JOYFULHOUSE</div>
    <div class="summary">
        <div><span>품목</span><b id="st-k">0</b></div>
        <div><span>총재고</span><b id="st-q">0</b></div>
        <div><span>위험</span><b id="st-d" style="color:red">0</b></div>
    </div>
    <div class="search-area"><input type="text" id="search" placeholder="상품명 또는 바코드 검색" onkeyup="render()"></div>
    <div class="btn-group">
        <button style="background:#22c55e" onclick="alert('목록의 + 버튼으로 입고하세요')">입고</button>
        <button style="background:#f97316" onclick="alert('목록의 - 버튼으로 출고하세요')">출고</button>
    </div>
</div>

<div id="list"></div>

<script>
    // ★ 여기에 새로 배포한 웹 앱 URL을 넣어주세요
    const URL = 'https://script.google.com/macros/s/AKfycbyDhHZplwOgL_jtHgPt3-aPcxLtdbWS_fqnxkFR_9YWbcMS87oxBC3EdtuBxwQE5vqkpg/exec'; 

    let inventory = [];

    // [JSONP 우회 수신기]
    function load() {
        const script = document.createElement('script');
        script.src = URL + "?callback=handleData&t=" + Date.now();
        document.body.appendChild(script);
    }

    // 데이터를 받으면 실행되는 함수
    function handleData(data) {
        inventory = data;
        render();
        updateStats();
        document.getElementById('loader').style.display = 'none';
    }

    function render() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = inventory.filter(i => i.제품명.toLowerCase().includes(q) || i.바코드.includes(q));
        
        document.getElementById('list').innerHTML = filtered.map(i => `
            <div class="item-row">
                <div>
                    <span class="barcode">${i.바코드}</span>
                    <span class="name">${i.제품명}</span>
                </div>
                <div class="stock-control">
                    <button onclick="update('${i.바코드}', -1)">-</button>
                    <span class="stock-val" style="color:${i.재고수량 < 5 ? 'red' : 'inherit'}">${i.재고수량}</span>
                    <button onclick="update('${i.바코드}', 1)" style="color:var(--deep-mint)">+</button>
                </div>
            </div>
        `).join('') || '<div style="padding:50px; text-align:center;">내역 없음</div>';
    }

    async function update(id, amt) {
        const item = inventory.find(i => i.바코드 === id);
        if(item) {
            item.재고수량 += amt;
            render(); updateStats();
            fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify([{id, amount: amt}]) });
        }
    }

    function updateStats() {
        document.getElementById('st-q').innerText = inventory.reduce((s, i) => s + i.재고수량, 0).toLocaleString();
        document.getElementById('st-k').innerText = inventory.length;
        document.getElementById('st-d').innerText = inventory.filter(i => i.재고수량 < 5).length;
    }

    window.onload = load;
</script>
</body>
</html>
