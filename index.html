<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOYFULHOUSE 재고관리</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #38bdf8; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { margin-bottom: 24px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        #search { width: 100%; padding: 12px; border-radius: 8px; background: var(--card); border: 1px solid #334155; color: white; margin-bottom: 16px; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #334155; }
        .info { display: flex; justify-content: space-between; align-items: center; }
        .barcode { font-size: 12px; color: #94a3b8; }
        .name { font-size: 16px; font-weight: 600; margin: 4px 0; }
        .stock-val { font-size: 18px; font-weight: 800; color: var(--primary); }
        .btns { display: flex; gap: 8px; margin-top: 12px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-minus { background: #ef4444; color: white; }
        .btn-plus { background: #22c55e; color: white; }
        button:active { opacity: 0.7; transform: scale(0.98); }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🏠 JOYFULHOUSE</h1></div>
        <input type="text" id="search" placeholder="상품명 또는 바코드 검색..." onkeyup="filterItems()">
        <div id="list" class="loading">데이터를 불러오는 중...</div>
    </div>

    <script>
        // 새로 배포하신 주소로 업데이트 완료!
        const API_URL = 'https://script.google.com/macros/s/AKfycbwd_mm9tF9EPU-zOYCg7HN6L3g_wcTJsxF8N8SSQ5XL-U0OIfl5-E5piLoRKTNemIDF/exec';
        let inventory = [];

        async function load() {
            try {
                const res = await fetch(API_URL);
                inventory = await res.json();
                render(inventory);
            } catch (e) { 
                console.error(e);
                document.getElementById('list').innerText = "오류 발생! 시트 설정을 확인해주세요."; 
            }
        }

        function render(items) {
            const listDiv = document.getElementById('list');
            listDiv.className = '';
            // 시트 제목이 '재고수량'일 경우를 대비해 처리했습니다.
            listDiv.innerHTML = items.map(item => `
                <div class="card">
                    <div class="info">
                        <div>
                            <div class="barcode">${item['바코드'] || 'N/A'}</div>
                            <div class="name">${item['제품명'] || '이름 없음'}</div>
                        </div>
                        <div class="stock-val" id="stock-${item['바코드']}">${item['재고수량'] !== undefined ? item['재고수량'] : item['현재재고']}</div>
                    </div>
                    <div class="btns">
                        <button class="btn-minus" onclick="update('${item['바코드']}', -1)">출고 -1</button>
                        <button class="btn-plus" onclick="update('${item['바코드']}', 1)">입고 +1</button>
                    </div>
                </div>
            `).join('');
        }

        async function update(id, amount) {
            const badge = document.getElementById(`stock-${id}`);
            const oldVal = badge.innerText;
            badge.innerText = "⏳";
            try {
                // 입출고 데이터를 전송합니다.
                await fetch(`${API_URL}?id=${id}&amount=${amount}`, { method: 'POST' });
                // 전송 후 데이터 다시 불러오기
                setTimeout(load, 500); 
            } catch (e) { 
                alert("업데이트 실패"); 
                badge.innerText = oldVal; 
            }
        }

        function filterItems() {
            const q = document.getElementById('search').value.toLowerCase();
            render(inventory.filter(i => 
                (i['제품명'] && i['제품명'].toLowerCase().includes(q)) || 
                (i['바코드'] && String(i['바코드']).toLowerCase().includes(q))
            ));
        }

        load();
    </script>
</body>
</html>
