<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOYFULHOUSE 재고관리</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #38bdf8; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { margin-bottom: 24px; border-bottom: 1px solid #334155; padding-bottom: 10px; text-align: center; }
        #search { width: 100%; padding: 12px; border-radius: 8px; background: var(--card); border: 1px solid #334155; color: white; margin-bottom: 16px; box-sizing: border-box; font-size: 16px; }
        .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #334155; }
        .info { display: flex; justify-content: space-between; align-items: center; }
        .name { font-size: 16px; font-weight: 600; color: #e2e8f0; }
        .stock-val { font-size: 20px; font-weight: 800; color: var(--primary); }
        .btns { display: flex; gap: 10px; margin-top: 16px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-minus { background: #ef4444; }
        .btn-plus { background: #22c55e; }
        .loading { text-align: center; padding: 50px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🏠 JOYFULHOUSE</h1></div>
        <input type="text" id="search" placeholder="상품명 검색..." onkeyup="filterItems()">
        <div id="list" class="loading">데이터를 불러오는 중...</div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwrhREP0DkcezIafZfv4BEW2cVD24SfzUsPav9bTbdF7m-PCAOzlfn_nKvnTLKxWt4/exec';
        let inventory = [];

        async function load() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                // 데이터 중 '바코드'가 있는 정상적인 항목만 걸러냅니다.
                inventory = data.filter(item => item['바코드']);
                render(inventory);
            } catch (e) { 
                document.getElementById('list').innerHTML = "<b>로딩 실패</b>"; 
            }
        }

        function render(items) {
            const listDiv = document.getElementById('list');
            listDiv.className = '';
            listDiv.innerHTML = items.map(item => `
                <div class="card">
                    <div class="info">
                        <div>
                            <div style="font-size:11px;color:#94a3b8">${item['바코드']}</div>
                            <div class="name">${item['제품명']}</div>
                        </div>
                        <div class="stock-val" id="stock-${item['바코드']}">${item['재고수량'] || 0}</div>
                    </div>
                    <div class="btns">
                        <button class="btn-minus" onclick="update('${item['바코드']}', -1)">출고 -1</button>
                        <button class="btn-plus" onclick="update('${item['바코드']}', 1)">입고 +1</button>
                    </div>
                </div>
            `).join('');
        }

        async function update(id, amount) {
            const badge = document.getElementById(`stock-${id}`);
            badge.innerText = "⏳";
            try {
                await fetch(`${API_URL}?id=${id}&amount=${amount}`, { method: 'POST' });
                setTimeout(load, 500); 
            } catch (e) { alert("실패"); load(); }
        }

        function filterItems() {
            const q = document.getElementById('search').value.toLowerCase();
            render(inventory.filter(i => String(i['제품명']).toLowerCase().includes(q)));
        }
        load();
    </script>
</body>
</html>
