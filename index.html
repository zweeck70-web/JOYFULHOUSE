<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOYFULHOUSE 재고관리</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --mint: #2dd4bf; --deep-mint: #0d9488; --mustard: #eab308; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: -apple-system, sans-serif; background: #f8fafc; color: var(--text); margin: 0; padding-bottom: 80px; }
        .sticky-top { position: sticky; top: 0; background: #fff; z-index: 100; border-bottom: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header { padding: 15px 16px 5px; font-size: 24px; font-weight: 900; color: var(--mint); }
        .summary { display: flex; justify-content: space-around; padding: 12px; background: #fff; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .summary b { font-size: 20px; display: block; font-weight: 800; }
        .summary span { font-size: 11px; color: #64748b; }
        .search-area { padding: 12px 16px; background: #fff; }
        input#search { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); box-sizing: border-box; background: #f1f5f9; outline: none; font-size: 16px; }
        .btn-group { display: flex; gap: 6px; padding: 0 16px 12px; background: #fff; }
        .btn-group button { flex: 1; padding: 12px; border: none; border-radius: 8px; color: #fff; font-weight: 800; cursor: pointer; }
        .item-row { background: #fff; padding: 12px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
        .name { font-size: 14px; font-weight: 600; line-height: 1.4; }
        .stock-val { font-size: 18px; font-weight: 800; color: var(--deep-mint); }
        #loader { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loader">
    <div style="font-size: 20px; margin-bottom: 10px;">🚚 데이터를 가져오는 중...</div>
    <div style="color: #64748b;">(455개 품목 로딩 중)</div>
</div>

<div class="sticky-top">
    <div class="header">🏠 JOYFULHOUSE</div>
    <div class="summary">
        <div><span>품목</span><b id="st-k">0</b></div>
        <div><span>총재고</span><b id="st-q">0</b></div>
        <div><span>위험</span><b id="st-d" style="color:red">0</b></div>
    </div>
    <div class="search-area"><input type="text" id="search" placeholder="🔍 상품명 또는 바코드 검색" onkeyup="render()"></div>
    <div class="btn-group">
        <button style="background:#22c55e" onclick="location.reload()">새로고침</button>
        <button style="background:#6366f1" onclick="alert('엑셀 파일을 선택하세요'); handleOrder()">주문서(엑셀)</button>
    </div>
</div>

<div id="list"></div>

<script>
    // ★ 1. 사장님의 시트 ID를 넣어주세요 (주소창 /d/ 와 /edit 사이의 문자열)
    const SHEET_ID = '1BOX0SOrf2OGXP2RGzHgZs_KQ5swZRVykNaXNxeE7U78'; 
    // ★ 2. 구글 앱스 스크립트 배포 주소 (재고 '수정'용)
    const APP_URL = 'https://script.google.com/macros/s/AKfycbymwnG8rr2zY7JoSJkaKBejzoblKnfEzIpZ7fBN18lygrtfvK3w_GVsvJZ3-2cSl_7Dwg/exec';

    let inventory = [];

    // [핵심] 웹에 게시된 데이터를 CSV 형태로 초고속 로드
    async function loadData() {
        try {
            const response = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`);
            const csvText = await response.text();
            const rows = csvText.split('\n').map(row => row.split(','));
            
            inventory = [];
            rows.forEach((row, i) => {
                if(i === 0 || !row[0]) return;
                inventory.push({
                    "바코드": row[0].replace(/"/g, '').trim(),
                    "제품명": row[1].replace(/"/g, '').trim(),
                    "재고수량": parseInt(row[2]) || 0
                });
            });

            render();
            updateStats();
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            document.getElementById('loader').innerHTML = "⚠️ 로딩 실패. 시트의 '웹에 게시' 설정을 확인해주세요.";
        }
    }

    function render() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = inventory.filter(i => i.제품명.toLowerCase().includes(q) || i.바코드.includes(q));
        
        document.getElementById('list').innerHTML = filtered.map(i => `
            <div class="item-row">
                <div><small style="color:#94a3b8">${i.바코드}</small><div class="name">${i.제품명}</div></div>
                <div class="stock-val">${i.재고수량}</div>
            </div>`).join('');
    }

    function handleOrder() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.xlsx';
        input.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, {type:'array'});
                const sheet = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
                
                let updates = [];
                rows.forEach((r, idx) => {
                    if(idx > 0 && r[0]) updates.push({id: String(r[0]), amount: -(parseInt(r[1])||0)});
                });

                if(updates.length > 0 && confirm(`${updates.length}건을 출고하시겠습니까?`)) {
                    // 화면 선반영
                    updates.forEach(u => {
                        const item = inventory.find(inv => inv.바코드 === u.id);
                        if(item) item.재고수량 += u.amount;
                    });
                    render();
                    // 구글 시트 전송
                    fetch(APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(updates) });
                }
            };
            reader.readAsArrayBuffer(file);
        };
        input.click();
    }

    function updateStats() {
        document.getElementById('st-q').innerText = inventory.reduce((s, i) => s + i.재고수량, 0).toLocaleString();
        document.getElementById('st-k').innerText = inventory.length;
        document.getElementById('st-d').innerText = inventory.filter(i => i.재고수량 < 5).length;
    }

    window.onload = loadData;
</script>
</body>
</html>
