    // 3. 재고 상태 신호등 로직 (사장님 기준 적용)
    function getStatusColor(item) {
        const s = item.stock;
        const t = item.type;
        let green, red;

        if (t === '시계') { green = 10; red = 7; }
        else if (t === '주보') { green = 15; red = 10; }
        else { green = 10; red = 5; } // 액자 및 기타

        if (s >= green) return '#22c55e'; // 🟢 정상
        if (s < red) return '#ef4444';    // 🔴 위험
        return '#eab308';                 // 🟡 주의
    }

    // 4. 화면 렌더링
    function render(data) {
        const listDiv = document.getElementById('product-list');
        listDiv.innerHTML = data.map(item => `
            <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-100">
                <div class="flex-1">
                    <div class="flex items-center">
                        <span class="status-dot" style="background-color: ${getStatusColor(item)}"></span>
                        <span class="text-[10px] font-mono text-gray-400">${item.id}</span>
                    </div>
                    <span class="text-[15px] font-bold text-gray-700 block mt-1">${item.name}</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-xl font-black w-10 text-center" style="color: ${getStatusColor(item)}">${item.stock}</span>
                </div>
            </div>
        `).join('');

        // 상단 통계 업데이트
        const total = data.reduce((acc, cur) => acc + cur.stock, 0);
        const risks = data.filter(item => {
            const s = item.stock;
            const t = item.type;
            if(t === '시계') return s < 7;
            if(t === '주보') return s < 10;
            return s < 5;
        }).length;
        document.getElementById('total-stock-display').innerText = total.toLocaleString();
        document.getElementById('risk-count-display').innerText = risks;
    }

    // 5. 시트 데이터 가져오기
    async function fetchStock() {
        if(API_URL.includes("여기에")) return;
        const statusEl = document.getElementById('sync-status');
        statusEl.innerText = "🔄 동기화 중...";
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            masterData.forEach(item => {
                const match = data.find(s => s.code === item.id);
                if(match) item.stock = match.stock;
            });
            statusEl.innerText = "✅ 연결됨";
            statusEl.style.color = "#22c55e";
            render(masterData);
        } catch (e) {
            statusEl.innerText = "❌ 연결 실패";
            statusEl.style.color = "#ef4444";
        }
    }

    // 6. 필터 및 검색
    function filterCat(cat) {
        document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active', 'bg-yellow-400', 'text-white'));
        event.target.classList.add('active', 'bg-yellow-400', 'text-white');
        const filtered = (cat === '전체') ? masterData : masterData.filter(i => i.type.includes(cat));
        render(filtered);
    }

    function handleSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = masterData.filter(i => i.name.toLowerCase().includes(q) || i.id.toLowerCase().includes(q));
        render(filtered);
    }

    window.onload = () => {
        render(masterData);
        fetchStock();
    };
