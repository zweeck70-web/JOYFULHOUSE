        .barcode { font-size: 11px; color: #94a3b8; font-family: monospace; margin-bottom: 2px; }
        .stock-val { font-size: 18px; font-weight: 800; color: var(--deep-mint); }
        .cat-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #f1f5f9; color: #64748b; margin-bottom: 4px; display: inline-block; }

    let inventory = [];

    function init() {
        rawData.forEach((row, i) => {
            if(i === 0 || !row[0]) return;
            inventory.push({ 
                "바코드": String(row[0]).trim(), 
                "제품명": String(row[1]).trim(), 
                "재고수량": parseInt(row[2]) || 0,
                "카테고리": row[3]
            });
        });
        render();
        updateStats();
    }

    function render() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = inventory.filter(i => i.제품명.toLowerCase().includes(q) || i.바코드.includes(q));
        document.getElementById('list').innerHTML = filtered.map(i => `
            <div class="item-row">
                <div>
                    <div class="cat-tag">${i.카테고리}</div><br>
                    <div class="barcode">${i.바코드}</div>
                    <div class="name">${i.제품명}</div>
                </div>
                <div class="stock-val">${i.재고수량}</div>
            </div>`).join('') || '<div style="padding:50px; text-align:center; color:#94a3b8;">검색 결과가 없습니다.</div>';
    }

    function handleOrder() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.xlsx';
        input.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, {type:'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
                
                let updates = [];
                rows.forEach((r, idx) => {
                    if(idx > 0 && r[0]) {
                        updates.push({id: String(r[0]).trim(), amount: -(parseInt(r[1])||0)});
                    }
                });

                if(updates.length > 0) {
                    if(confirm(`${updates.length}건을 출고하시겠습니까?`)) {
                        updates.forEach(u => {
                            const item = inventory.find(inv => inv.바코드 === u.id);
                            if(item) item.재고수량 += u.amount;
                        });
                        render();
                        updateStats();
                        
                        // 구글 시트로 차감 데이터 전송
                        fetch(APP_URL, { 
                            method: 'POST', 
                            mode: 'no-cors', 
                            body: JSON.stringify(updates) 
                        });
                        alert("출고 처리 완료! 구글 시트에도 반영 요청을 보냈습니다.");
                    }
                } else {
                    alert("읽을 수 있는 데이터가 없습니다. (A열 바코드, B열 수량 확인)");
                }
            };
            reader.readAsArrayBuffer(file);
        };
        input.click();
    }

    function updateStats() {
        document.getElementById('st-q').innerText = inventory.reduce((s, i) => s + i.재고수량, 0).toLocaleString();
        document.getElementById('st-k').innerText = inventory.length;
        document.getElementById('st-d').innerText = inventory.filter(i => i.재고수량 < 1).length; // 품절 품목
    }

    init();
