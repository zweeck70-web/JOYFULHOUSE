    let inventory = [];
    let currentCatFilter = "전체";

    // 데이터 초기화
    function init() {
        let cat = "기타";
        rawData.split('\n').forEach(line => {
            line = line.trim();
            if(!line) return;
            if(line.startsWith('[')) {
                cat = line.replace('[','').replace(']','');
            } else if(line.includes(',')) {
                const parts = line.split(',');
                inventory.push({ 
                    id: parts[0].trim(), 
                    name: parts[1].trim(), 
                    stock: parseInt(parts[2]) || 0, 
                    cat: cat 
                });
            }
        });
        render(inventory);
    }

    // 신호등 로직
    function getDotColor(item) {
        const s = item.stock;
        if (item.cat.includes('시계')) return s >= 10 ? '#22c55e' : (s < 7 ? '#ef4444' : '#eab308');
        if (item.cat.includes('주보')) return s >= 15 ? '#22c55e' : (s < 10 ? '#ef4444' : '#eab308');
        return s >= 10 ? '#22c55e' : (s < 5 ? '#ef4444' : '#eab308');
    }

    // 화면 그리기
    function render(data) {
        const list = document.getElementById('list');
        list.innerHTML = data.map(item => `
            <div class="bg-white p-4 flex justify-between items-center transition-all active:bg-slate-50 border-b border-slate-50">
                <div class="flex-1 pr-4">
                    <div class="flex items-center gap-1 mb-1">
                        <span class="status-dot" style="background-color:${getDotColor(item)}"></span>
                        <span class="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 font-mono rounded tracking-tighter">${item.id}</span>
                        <span class="text-[10px] text-slate-400 font-medium">${item.cat}</span>
                    </div>
                    <span class="text-[15px] font-bold text-slate-800 block truncate">${item.name}</span>
                </div>
                <div class="flex items-center gap-3">
                    <button class="w-10 h-10 border border-slate-200 rounded-xl text-slate-300 font-bold">-</button>
                    <span class="w-6 text-center text-xl font-black ${item.stock < 5 ? 'text-red-500' : 'text-teal-500'}">${item.stock}</span>
                    <button class="w-10 h-10 border border-slate-200 rounded-xl text-teal-500 font-bold">+</button>
                </div>
            </div>
        `).join('');

        // 상단 통계 업데이트
        document.getElementById('count-ui').innerText = inventory.length;
        document.getElementById('total-ui').innerText = inventory.reduce((a,b)=>a+b.stock, 0).toLocaleString();
        document.getElementById('risk-ui').innerText = inventory.filter(i => {
            if(i.cat.includes('시계')) return i.stock < 7;
            if(i.cat.includes('주보')) return i.stock < 10;
            return i.stock < 5;
        }).length;
    }

    // 🔄 실시간 재고 동기화 함수
    async function fetchLiveStock() {
        if(!SCRIPT_URL || SCRIPT_URL.includes("여기에")) {
            alert("⚠️ 코드 내 SCRIPT_URL에 구글 앱스 스크립트 주소를 먼저 넣어주세요!");
            return;
        }
        
        document.getElementById('loading').style.display = 'flex';
        
        try {
            console.log("연결 시도 URL:", SCRIPT_URL);
            const res = await fetch(SCRIPT_URL);
            
            if (!res.ok) throw new Error('구글 서버 응답 실패 (상태코드: ' + res.status + ')');
            
            const live = await res.json();
            console.log("시트 데이터 수신 완료:", live);

            if (live.error) throw new Error('시트 내부 오류: ' + live.error);

            // 데이터 매칭
            let matchCount = 0;
            inventory.forEach(i => {
                const found = live.find(l => {
                    const sheetBarcode = String(l['바코드'] || l['ID'] || l['code']).trim();
                    return sheetBarcode === String(i.id).trim();
                });
                
                if(found) {
                    const sheetStock = parseInt(found['재고'] || found['재고수량'] || found['수량']) || 0;
                    i.stock = sheetStock;
                    matchCount++;
                }
            });
            
            render(inventory);
            alert("✅ 동기화 완료!\n시트에서 " + matchCount + "개의 품목 수량을 가져왔습니다.");
            
        } catch(e) { 
            console.error("상세 에러 내용:", e);
            alert("❌ 로딩 실패!\n\n[이유]\n" + e.message + "\n\n[체크사항]\n1. 시트 1행에 '바코드', '재고' 제목이 있나요?\n2. 구글 스크립트 배포 시 '모든 사용자'로 설정했나요?"); 
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // 카테고리 필터링
    function filterCat(c) {
        currentCatFilter = c;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText === c));
        const filtered = c === '전체' ? inventory : inventory.filter(i => i.cat.includes(c));
        render(filtered);
    }

    // 검색 핸들러
    function handleSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = (currentCatFilter === '전체' ? inventory : inventory.filter(i => i.cat.includes(currentCatFilter)))
                        .filter(i => i.name.toLowerCase().includes(q) || i.id.toLowerCase().includes(q));
        render(filtered);
    }

    // 앱 시작
    init();
</script>
